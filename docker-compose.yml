services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: wtdt-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  simulator:
    build: .
    container_name: wtdt-simulator
    command:
      - python
      - -m
      - wtdt
      - --steps
      - "600"
      - --sleep
      - --mqtt
      - --mqtt-host
      - mqtt
      - --historian-path
      - /data/historian.sqlite
    volumes:
      - ./data:/data
    depends_on:
      - mqtt

  cloud-bridge:
    build: .
    container_name: wtdt-cloud-bridge
    profiles:
      - cloud
    command:
      - python
      - -m
      - wtdt.cloud_bridge.main
    environment:
      LOCAL_MQTT_HOST: mqtt
      LOCAL_MQTT_PORT: "1883"
      TB_HOST: ${TB_HOST:-mqtt.thingsboard.cloud}
      TB_PORT: ${TB_PORT:-1883}
      TB_TOKEN: ${TB_TOKEN:-paste_your_device_access_token_here}
      FLUSH_INTERVAL_S: ${FLUSH_INTERVAL_S:-1.0}
    depends_on:
      - mqtt
      - simulator

  telegram-alerts:
    build: .
    container_name: wtdt-telegram-alerts
    profiles:
      - telegram
    command:
      - python
      - -m
      - wtdt.telegram_alerts.main
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-paste_your_telegram_bot_token_here}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-paste_your_chat_id_here}
      DRY_RUN: ${DRY_RUN:-true}
      TELEGRAM_THROTTLE_S: ${TELEGRAM_THROTTLE_S:-60.0}
      TELEGRAM_CLEAR_AFTER_S: ${TELEGRAM_CLEAR_AFTER_S:-5.0}
    depends_on:
      - mqtt
      - simulator

  dashboard:
    build: .
    container_name: wtdt-dashboard
    command: streamlit run src/wtdt/dashboard/app.py --server.address 0.0.0.0
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      HISTORIAN_PATH: /data/historian.sqlite
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
    depends_on:
      - mqtt
      - simulator
